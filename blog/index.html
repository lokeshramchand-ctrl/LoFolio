<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — Lokesh Ram Chand</title>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link
    href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,500,600,700&f[]=general-sans@200,300,400,500,600&display=swap"
    rel="stylesheet">

  <style>
    /* --- 1. VARIABLES & THEMES --- */
    :root {
      --bg: #0b0b0b;
      --text: #e0e0e0;
      --acc: #888;
      --border: rgba(255, 255, 255, 0.1);
      --cursor: #fff;
      --nav-bg: rgba(11, 11, 11, 0.8);
      --overlay: rgba(255, 255, 255, 0.03);
      --accent: #22c55e;
    }

    [data-theme="light"] {
      --bg: #f4f4f4;
      --text: #1a1a1a;
      --acc: #555;
      --border: rgba(0, 0, 0, 0.1);
      --cursor: #000;
      --nav-bg: rgba(244, 244, 244, 0.8);
      --overlay: rgba(0, 0, 0, 0.03);
      --accent: #15803d;
    }

    /* --- 2. RESET --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    html, body {
      width: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'General Sans', sans-serif;
      overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    a { text-decoration: none; color: inherit; display: block; }
    ul { list-style: none; }
    button { border: none; background: none; cursor: none; color: inherit; }

    /* --- 3. UTILITIES --- */
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9000; opacity: 0.04;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    }

    /* --- 4. CUSTOM CURSOR --- */
    #cursor {
      position: fixed; top: 0; left: 0; width: 15px; height: 15px;
      background-color: var(--text); border-radius: 50%;
      pointer-events: none; z-index: 9999; mix-blend-mode: difference;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, transform 0.1s;
    }

    /* --- 5. LOADER --- */
    #loader {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 10000; display: flex; justify-content: center; align-items: center;
    }
    .counter { font-family: 'Clash Display', sans-serif; font-size: 10vw; font-weight: 600; }

    /* --- 6. HERO (Slimmer) --- */
    #hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20vh 5vw 8vh; /* Tightened padding for a slimmer look */
      position: relative;
    }

    .hero-line { overflow: hidden; line-height: 1; }

    .hero-subtitle {
      font-family: 'General Sans', sans-serif;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2vh;
      display: block;
    }

    .hero-title {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(3.5rem, 10vw, 8rem); /* Slightly scaled down */
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text);
      transform: translateY(100%);
    }

    .hero-title.outline {
      color: transparent;
      -webkit-text-stroke: 1px var(--text);
      opacity: 0.5;
    }

    /* --- 7. ARTICLES LIST (Slimmer Rows) --- */
    #articles {
      padding: 0 5vw 15vh;
      position: relative;
    }

    .article-list { display: flex; flex-direction: column; }

    .article-item {
      padding: 35px 0; /* Reduced from 50px to make rows slimmer */
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: opacity 0.4s ease;
      position: relative;
    }

    .article-item:first-child { border-top: 1px solid var(--border); }

    .article-list:hover .article-item { opacity: 0.3; }
    .article-list:hover .article-item:hover { opacity: 1; }

    .a-left {
      display: flex; flex-direction: column; gap: 8px; flex: 2;
    }

    .a-meta {
      font-family: 'General Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--acc);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .a-name {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 3.5rem); /* Scaled down for a neater fit */
      font-weight: 500;
      line-height: 1.1;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s;
    }

    .a-center {
      display: flex; gap: 12px; flex: 1; justify-content: flex-start;
    }

    .a-tag {
      font-size: 0.75rem; padding: 6px 16px;
      border: 1px solid var(--border); border-radius: 50px;
      color: var(--acc); text-transform: uppercase; letter-spacing: 1px;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .a-right {
      display: flex; align-items: center; justify-content: flex-end; flex: 0.5;
    }

    .a-icon {
      font-size: 2rem; color: var(--acc);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s;
    }

    .article-item:hover .a-name { transform: translateX(20px); color: var(--text); }
    .article-item:hover .a-icon { transform: rotate(45deg); color: var(--text); }
    .article-item:hover .a-tag { border-color: var(--text); color: var(--text); }

    /* --- MEDIA QUERIES --- */
    @media (max-width: 768px) {
      #cursor, .preview-img { display: none !important; }
      * { cursor: auto !important; }
      
      .article-item { flex-direction: column; align-items: flex-start; gap: 15px; padding: 25px 0; }
      .a-center { width: 100%; flex-wrap: wrap; margin-top: 5px; }
      .a-right { display: none; }
      .article-item:hover .a-name { transform: translateX(10px); }
    }
  </style>
</head>

<body>

  <div class="noise-overlay"></div>
  <div id="cursor"></div>

  <div id="navbar-placeholder"></div>

  <div id="main">

    <section id="hero">
      <span class="hero-subtitle reveal-text">Thoughts & Discoveries.</span>
      <div class="hero-line">
        <h1 class="hero-title">The</h1>
      </div>
      <div class="hero-line">
        <h1 class="hero-title outline">Journal</h1>
      </div>
    </section>

    <section id="articles">
      <div class="article-list">

        <a href="/blog/NLP-System/" class="article-item magnet" data-img="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=2000">
          <div class="a-left">
            <span class="a-meta">April 26, 2026 • 8 Min Read</span>
            <div class="a-name">Why Accuracy Lied: Lessons from Building an NLP System</div>
          </div>
          <div class="a-center">
            <span class="a-tag">System Design</span>
            <span class="a-tag">ML Systems</span>
          </div>
          <div class="a-right">
            <i class="ri-arrow-right-up-line a-icon"></i>
          </div>
        </a>


      </div>
    </section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/components-loader.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    // --- 1. THEME SWITCHER LOGIC ---
    function toggleTheme() {
      const html = document.documentElement;
      const themeIcon = document.getElementById('theme-icon');
      if (!themeIcon) return;
      
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      themeIcon.className = newTheme === 'light' ? 'ri-sun-line' : 'ri-moon-line';
      
      try { localStorage.setItem('theme', newTheme); } catch (e) {}
    }

    try {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.className = savedTheme === 'light' ? 'ri-sun-line' : 'ri-moon-line';
      }
    } catch (e) {}


    // --- 2. SMOOTH SCROLL ---
    const lenis = new Lenis();
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // --- 3. CURSOR & MAGNETS (Desktop Only) ---
    if (window.matchMedia("(min-width: 769px)").matches) {
      const cursor = document.getElementById("cursor");

      window.addEventListener("mousemove", (e) => {
        gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
      });

      document.querySelectorAll(".magnet").forEach((magnet) => {
        magnet.addEventListener("mousemove", (e) => {
          const rect = magnet.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          gsap.to(magnet, { x: x * 0.3, y: y * 0.3, duration: 0.3 });
          gsap.to(cursor, { scale: 3 });
        });

        magnet.addEventListener("mouseleave", () => {
          gsap.to(magnet, { x: 0, y: 0 });
          gsap.to(cursor, { scale: 1 });
        });
      });
    }

    // --- 4. HERO SECTION ANIMATIONS ---
    gsap.set(".hero-title", { y: 50, opacity: 0 });
    gsap.set(".hero-subtitle", { y: 20, opacity: 0 });

    gsap.to(".hero-title", {
      y: 0,
      opacity: 1,
      duration: 1.5,
      ease: "power4.out",
      stagger: 0.2,
    });

    gsap.to(".hero-subtitle", {
      y: 0,
      opacity: 1,
      duration: 1.2,
      ease: "power3.out",
      delay: 0.5,
    });

    // --- 5. ARTICLE LIST ANIMATIONS ---
    document.querySelectorAll(".article-item").forEach((item, index) => {
      gsap.from(item, {
        scrollTrigger: {
          trigger: item,
          start: "top 80%",
          toggleActions: "play none none reverse",
        },
        y: 50,
        opacity: 0,
        duration: 1,
        ease: "power3.out",
        delay: index * 0.1,
      });

      // Hover effect for articles
      item.addEventListener("mouseenter", () => {
        gsap.to(item, { scale: 1.05, duration: 0.3, ease: "power3.out" });
      });

      item.addEventListener("mouseleave", () => {
        gsap.to(item, { scale: 1, duration: 0.3, ease: "power3.out" });
      });
    });

    // --- 6. BACKGROUND OVERLAY ANIMATION ---
    gsap.to(".noise-overlay", {
      opacity: 0.1,
      duration: 2,
      ease: "power1.inOut",
      repeat: -1,
      yoyo: true,
    });

    // --- 7. SCROLL ANIMATIONS ---
    let proxy = { skew: 0 },
      skewSetter = gsap.quickSetter(".article-item", "skewY", "deg"),
      clamp = gsap.utils.clamp(-8, 8); // Tighter clamp for slimmer rows

    ScrollTrigger.create({
      onUpdate: (self) => {
        let skew = clamp(self.getVelocity() / -300);
        if (Math.abs(skew) > Math.abs(proxy.skew)) {
          proxy.skew = skew;
          gsap.to(proxy, {
            skew: 0, duration: 0.8, ease: "power3", overwrite: true,
            onUpdate: () => skewSetter(proxy.skew)
          });
        }
      }
    });

    // --- 8. ICON ANIMATIONS ---
    document.querySelectorAll(".a-icon").forEach((icon) => {
      icon.addEventListener("mouseenter", () => {
        gsap.to(icon, { rotate: 360, scale: 1.2, duration: 0.5, ease: "power3.out" });
      });

      icon.addEventListener("mouseleave", () => {
        gsap.to(icon, { rotate: 0, scale: 1, duration: 0.5, ease: "power3.out" });
      });
    });
</script>
</body>

</html>
