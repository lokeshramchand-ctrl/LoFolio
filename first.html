<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 24px;
      border: 1px solid #fff;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    a:hover {
      background: #fff;
      color: #000;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>New Portfolio On The Way 🚀</h1>
    <p>Meanwhile, check out my GitHub below</p>
    <a href="https://github.com/lokeshramchand-ctrl" target="_blank">
      Click Here
    </a>
  </div>

  <script>
    // Optional smooth entrance delay
    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.opacity = 1;
    });
  </script>

</body>
</html>
