<!DOCTYPE html>
<html lang="en">
<!--
  FOOTER COMPONENT
  ─────────────────
  This file is both a standalone preview AND the source for the shared loader.
  To use it in any page, include components-loader.js (see index.html or any subpage).
  
  The <div id="footer-component"> below is what gets injected into other pages.
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Component Preview</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,500,600,700&f[]=general-sans@200,300,400,500,600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #0b0b0b; color: #e0e0e0; font-family: 'General Sans', sans-serif; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     FOOTER COMPONENT — Copy everything inside this div
     ═══════════════════════════════════════════════════ -->
<div id="footer-component">

  <style id="footer-styles">
    /* ── FOOTER VARIABLES (inherits from page :root if present) ── */
    #footer-component {
      --text: #e0e0e0;
      --acc:  #888;
      --bg:   #0b0b0b;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #22c55e;
    }
    [data-theme="light"] #footer-component {
      --text: #1a1a1a;
      --acc:  #555;
      --bg:   #f4f4f4;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #15803d;
    }

    /* ── FOOTER LAYOUT ── */
    #footer-component footer {
      padding: 100px 5vw 40px;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      position: relative;
    }

    #footer-component .footer-container {
      display: flex;
      justify-content: space-between;
      gap: 60px;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    #footer-component .footer-left {
      flex: 1;
      min-width: 300px;
    }

    #footer-component .footer-right {
      flex: 1;
      min-width: 300px;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── BIG HEADLINE ── */
    #footer-component .footer-title {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.9;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      display: block;
    }

    #footer-component .footer-title.outline {
      color: transparent;
      -webkit-text-stroke: 1px var(--text);
      opacity: 0.5;
    }

    #footer-component .footer-desc {
      font-size: 1.1rem;
      color: var(--acc);
      margin: 30px 0 40px;
      max-width: 400px;
      line-height: 1.5;
    }

    /* ── SOCIAL LINKS ── */
    #footer-component .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    #footer-component .social-link {
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 100px;
      transition: all 0.3s;
      text-transform: uppercase;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
    }

    #footer-component .social-link:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── CONTACT FORM ── */
    #footer-component #contact-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    #footer-component .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #footer-component .input-group label {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--acc);
      letter-spacing: 1px;
    }

    #footer-component .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-family: 'General Sans', sans-serif;
      font-size: 1.2rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s;
      border-radius: 0;
      box-sizing: border-box;
    }

    #footer-component .form-input:focus {
      border-color: var(--text);
    }

    #footer-component .form-input::placeholder {
      color: var(--acc);
      opacity: 0.3;
    }

    #footer-component #submit-btn {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'General Sans', sans-serif;
      font-size: 1rem;
      text-transform: uppercase;
      border: 1px solid var(--text);
      background: var(--text);
      color: var(--bg);
      padding: 16px 40px;
      border-radius: 100px;
      transition: all 0.3s;
      letter-spacing: 1px;
      font-weight: 500;
      cursor: pointer;
    }

    #footer-component #submit-btn:hover {
      background: transparent;
      color: var(--text);
    }

    #footer-component #form-status {
      font-size: 0.9rem;
      min-height: 20px;
      margin-top: -20px;
    }

    /* ── FOOTER BOTTOM BAR ── */
    #footer-component .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 30px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--acc);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #footer-component .footer-container {
        flex-direction: column;
        gap: 50px;
      }
      #footer-component .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
  </style>

  <footer>
    <div class="footer-container">

      <!-- Left: Big headline + social links -->
      <div class="footer-left">
        <span class="footer-title">Say</span>
        <span class="footer-title outline">Hello.</span>

        <p class="footer-desc">
          Got a project in mind or just want to say hi? Feel free to reach out and
          let's build something great together.
        </p>

        <div class="socials">
          <a href="mailto:lokeshramchand@gmail.com" class="social-link magnet">
            Email <i class="ri-arrow-right-up-line"></i>
          </a>
          <a href="https://linkedin.com/in/lokeshramchand" class="social-link magnet">
            LinkedIn <i class="ri-arrow-right-up-line"></i>
          </a>
          <a href="https://github.com/lokeshramchand-ctrl" class="social-link magnet">
            Github <i class="ri-arrow-right-up-line"></i>
          </a>
        </div>
      </div>

      <!-- Right: Contact form -->
      <div class="footer-right">
        <form id="contact-form">
          <div class="input-group">
            <label for="form-email">What's your email?</label>
            <input type="email" id="form-email" class="form-input" placeholder="....@gmail.com" required>
          </div>
          <div class="input-group">
            <label for="form-work">What's your message?</label>
            <input type="text" id="form-work" class="form-input" placeholder="Hi! , I am ..." required>
          </div>
          <button type="submit" id="submit-btn" class="magnet">
            <span>Send Message</span>
            <i class="ri-arrow-right-line"></i>
          </button>
          <p id="form-status"></p>
        </form>
      </div>

    </div>

    <div class="footer-bottom">
      <span>Local Time: <span id="local-time">--:--</span> IST</span>
    </div>
  </footer>

  <script id="footer-script">
    (function () {
      /* ── Live local time ── */
      function updateTime() {
        const el = document.getElementById('local-time');
        if (!el) return;
        el.textContent = new Date().toLocaleTimeString('en-US', {
          timeZone: 'Asia/Kolkata',
          hour: '2-digit', minute: '2-digit', hour12: true
        });
      }
      setInterval(updateTime, 1000);
      updateTime();

      /* ── Contact form ── */
      const form      = document.getElementById('contact-form');
      const statusMsg = document.getElementById('form-status');
      const submitBtn = document.getElementById('submit-btn');
      const btnText   = submitBtn.querySelector('span');

      form.addEventListener('submit', async e => {
        e.preventDefault();
        const email = document.getElementById('form-email').value;
        const work  = document.getElementById('form-work').value;
        const orig  = btnText.innerHTML;

        submitBtn.style.opacity = '0.7';
        btnText.innerHTML = 'Sending...';
        statusMsg.innerText = '';

        try {
          const res = await fetch(
            'https://analytics.priyatham.in/open/workspace/clnzoxcy10001vy2ohi4obbi0/survey/cml9ga0e702x3v5d7hn6viddw/submit',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ payload: { field_Nrgp: email, field_T1tJ: work } })
            }
          );
          if (res.ok) {
            statusMsg.style.color = 'var(--accent)';
            statusMsg.innerText = 'Message sent successfully.';
            form.reset();
            setTimeout(() => { btnText.innerHTML = orig; submitBtn.style.opacity = '1'; }, 3000);
          } else { throw new Error(); }
        } catch {
          statusMsg.style.color = '#ef4444';
          statusMsg.innerText = 'Unable to send. Please try again.';
          btnText.innerHTML = orig;
          submitBtn.style.opacity = '1';
        }
      });

      /* ── Magnet effect (desktop only) ── */
      if (window.matchMedia('(min-width: 769px)').matches && window.gsap) {
        document.querySelectorAll('#footer-component .magnet').forEach(el => {
          el.addEventListener('mousemove', e => {
            const r = el.getBoundingClientRect();
            gsap.to(el, { x: (e.clientX - r.left - r.width / 2) * 0.3, y: (e.clientY - r.top - r.height / 2) * 0.3, duration: 0.3 });
          });
          el.addEventListener('mouseleave', () => gsap.to(el, { x: 0, y: 0 }));
        });
      }
    })();
  </script>

</div>
<!-- ═══════════════════════════════════════════════════
     END FOOTER COMPONENT
     ═══════════════════════════════════════════════════ -->

</body>
</html>
