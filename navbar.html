<style>
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5vw;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 100;

        /* THE FIX: Comment out the blur effect to stop it from breaking your mix-blend-mode cursor */
        /* backdrop-filter: blur(10px); */

        /* Make the background slightly darker to compensate for the missing blur */
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        transition: background 0.5s ease;
    }

    nav,
    nav * {
        cursor: none !important;
    }

    .logo {
        font-family: 'Clash Display', sans-serif;
        font-weight: 600;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 30px;
    }

    .menu-items {
        display: flex;
        gap: 30px;
    }

    .menu-link {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
    }

    .menu-link::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: var(--text);
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.4s ease;
    }

    .menu-link:hover::after {
        transform: scaleX(1);
        transform-origin: left;
    }

    .theme-btn {
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .menu-icon {
        display: none;
        font-size: 1.5rem;
        z-index: 102;
    }

    .mobile-menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: var(--bg);
        z-index: 101;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        transform: translateY(-100%);
        transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
    }

    .mobile-menu.active {
        transform: translateY(0);
    }

    .mobile-link {
        font-family: 'Clash Display', sans-serif;
        font-size: 3rem;
        color: var(--text);
    }

    @media (max-width: 768px) {
        .menu-items {
            display: none;
        }

        .menu-icon {
            display: block;
        }

        nav {
            padding: 20px 5vw;
        }
    }
</style>

<div class="mobile-menu">
    <a href="/home/index.html#work" class="mobile-link" onclick="toggleMenu()">Projects</a>
    <a href="/home/index.html#about" class="mobile-link" onclick="toggleMenu()">About</a>
    <a href="/blog/" class="mobile-link" onclick="toggleMenu()">Blog</a>
    <a href="https://drive.google.com/file/d/1HicrndILNyc9dkNFDz_BzozauWinXTyj/view?usp=drive_link" class="mobile-link" onclick="toggleMenu()">Resume</a>
</div>

<nav>
    <a href="/home/" class="logo magnet">Lokesh Ram Chand</a>

    <div class="nav-right">
        <div class="menu-items">
            <a href="/home/index.html#work" class="menu-link magnet">Projects</a>
            <a href="/home/index.html#about" class="menu-link magnet">About</a>
            <a href="/blog/" class="menu-link magnet">Blog</a>
            <a href="https://drive.google.com/file/d/1HicrndILNyc9dkNFDz_BzozauWinXTyj/view?usp=drive_link"
                target="_blank" class="menu-link magnet">Resume</a>
        </div>

        <button class="theme-btn magnet" onclick="toggleTheme()" aria-label="Toggle Theme">
            <i class="ri-moon-line" id="theme-icon"></i>
        </button>

        <button class="menu-icon" onclick="toggleMenu()" aria-label="Menu">
            <i class="ri-menu-4-line"></i>
        </button>
    </div>
</nav>

<script>
    // Theme Toggle Logic
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const currentTheme = html.getAttribute('data-theme');

        if (currentTheme === 'dark') {
            html.setAttribute('data-theme', 'light');
            icon.className = 'ri-sun-line';
            localStorage.setItem('theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark');
            icon.className = 'ri-moon-line';
            localStorage.setItem('theme', 'dark');
        }
    }

    // Mobile Menu Logic
    function toggleMenu() {
        const menu = document.querySelector('.mobile-menu');
        menu.classList.toggle('active');
    }

    // Auto-set the correct icon on load based on main page state
    (function initThemeIcon() {
        const savedTheme = localStorage.getItem('theme');
        const icon = document.getElementById('theme-icon');
        if (savedTheme && icon) {
            icon.className = savedTheme === 'light' ? 'ri-sun-line' : 'ri-moon-line';
        }
    })();
</script>
