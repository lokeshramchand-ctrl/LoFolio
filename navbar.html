<!DOCTYPE html>
<html lang="en">
<!--
  NAVBAR COMPONENT
  ─────────────────
  This file is both a standalone preview AND the source for the shared loader.
  To use it in any page, include components-loader.js (see index.html or any subpage).
  
  The <div id="navbar-component"> below is what gets injected into other pages.
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Component Preview</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,500,600,700&f[]=general-sans@200,300,400,500,600&display=swap" rel="stylesheet">
  <style>
    /* Preview page styles only */
    body { margin: 0; background: #0b0b0b; color: #e0e0e0; font-family: 'General Sans', sans-serif; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     NAVBAR COMPONENT — Copy everything inside this div
     ═══════════════════════════════════════════════════ -->
<div id="navbar-component">

  <style id="navbar-styles">
    /* ── NAVBAR VARIABLES (inherits from page :root if present) ── */
    #navbar-component {
      --nav-bg: rgba(11, 11, 11, 0.8);
      --text: #e0e0e0;
      --border: rgba(255, 255, 255, 0.1);
      --bg: #0b0b0b;
    }
    [data-theme="light"] #navbar-component {
      --nav-bg: rgba(244, 244, 244, 0.8);
      --text: #1a1a1a;
      --border: rgba(0, 0, 0, 0.1);
      --bg: #f4f4f4;
    }

    /* ── NAV BASE ── */
    #navbar-component nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5vw;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.5s ease;
      box-sizing: border-box;
    }

    #navbar-component .logo {
      font-family: 'Clash Display', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
    }

    #navbar-component .nav-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    #navbar-component .menu-items {
      display: flex;
      gap: 30px;
    }

    #navbar-component .menu-link {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      text-decoration: none;
    }

    #navbar-component .menu-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--text);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s ease;
    }

    #navbar-component .menu-link:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    #navbar-component .theme-btn {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
    }

    #navbar-component .menu-icon {
      display: none;
      font-size: 1.5rem;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      z-index: 102;
    }

    /* ── MOBILE MENU ── */
    #navbar-component .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: var(--bg);
      z-index: 101;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      transform: translateY(-100%);
      transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
    }

    #navbar-component .mobile-menu.active {
      transform: translateY(0);
    }

    #navbar-component .mobile-link {
      font-family: 'Clash Display', sans-serif;
      font-size: 3rem;
      color: var(--text);
      text-decoration: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #navbar-component .menu-items { display: none; }
      #navbar-component .menu-icon { display: block; }
    }
  </style>

  <!-- Mobile overlay menu -->
  <div class="mobile-menu" id="nav-mobile-menu">
    <a href="./index.html#work" class="mobile-link" id="nav-mob-projects">Projects</a>
    <a href="./blog.html"       class="mobile-link" id="nav-mob-journal">Journal</a>
    <a href="./index.html#about" class="mobile-link" id="nav-mob-about">About</a>
    <a href="https://drive.google.com/file/d/1HicrndILNyc9dkNFDz_BzozauWinXTyj/view?usp=drive_link"
       target="_blank" class="mobile-link">Resume</a>
  </div>

  <!-- Main nav bar -->
  <nav>
    <a href="./index.html" class="logo magnet">Lokesh Ram Chand</a>

    <div class="nav-right">
      <div class="menu-items">
        <a href="./index.html#work"  class="menu-link magnet">Projects</a>
        <a href="./blog.html"        class="menu-link magnet">Journal</a>
        <a href="./index.html#about" class="menu-link magnet">About</a>
        <a href="https://drive.google.com/file/d/1HicrndILNyc9dkNFDz_BzozauWinXTyj/view?usp=drive_link"
           target="_blank" class="menu-link magnet">Resume</a>
      </div>

      <button class="theme-btn magnet" id="nav-theme-btn" aria-label="Toggle Theme">
        <i class="ri-moon-line" id="theme-icon"></i>
      </button>

      <button class="menu-icon" id="nav-hamburger" aria-label="Menu">
        <i class="ri-menu-4-line"></i>
      </button>
    </div>
  </nav>

  <script id="navbar-script">
    (function () {
      /* ── Theme toggle ── */
      function navToggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.className = isDark ? 'ri-sun-line' : 'ri-moon-line';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
      }

      /* Apply saved theme on load */
      (function applySavedTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
          const icon = document.getElementById('theme-icon');
          if (icon) icon.className = saved === 'light' ? 'ri-sun-line' : 'ri-moon-line';
        }
      })();

      document.getElementById('nav-theme-btn')
        .addEventListener('click', navToggleTheme);

      /* ── Mobile menu toggle ── */
      function navToggleMobile() {
        const menu = document.getElementById('nav-mobile-menu');
        menu.classList.toggle('active');
      }

      document.getElementById('nav-hamburger')
        .addEventListener('click', navToggleMobile);

      /* Close mobile links */
      document.querySelectorAll('#nav-mobile-menu .mobile-link')
        .forEach(link => link.addEventListener('click', navToggleMobile));

      /* ── Magnet effect (desktop only) ── */
      if (window.matchMedia('(min-width: 769px)').matches && window.gsap) {
        document.querySelectorAll('#navbar-component .magnet').forEach(el => {
          el.addEventListener('mousemove', e => {
            const r = el.getBoundingClientRect();
            gsap.to(el, { x: (e.clientX - r.left - r.width / 2) * 0.3, y: (e.clientY - r.top - r.height / 2) * 0.3, duration: 0.3 });
          });
          el.addEventListener('mouseleave', () => gsap.to(el, { x: 0, y: 0 }));
        });
      }
    })();
  </script>

</div>
<!-- ═══════════════════════════════════════════════════
     END NAVBAR COMPONENT
     ═══════════════════════════════════════════════════ -->

</body>
</html>
